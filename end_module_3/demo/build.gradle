plugins {
    id 'java'
    id 'war'
}

group 'com.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.10.2'
}

sourceCompatibility = '1.8'
targetCompatibility = '1.8'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

dependencies {
    compileOnly('javax.servlet:javax.servlet-api:4.0.1')
    // 2. Thư viện JSTL (Giải quyết triệt để lỗi báo đỏ <c:if>, <c:forEach>)
    implementation 'javax.servlet:jstl:1.2'

    // 3. MySQL Connector (Dùng để nạp Driver kết nối cơ sở dữ liệu)
    implementation 'mysql:mysql-connector-java:8.0.28'
    // 4. Khai báo thư viện Lombok để tự động sinh Getter/Setter (Giải quyết lỗi Cannot resolve method)
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly 'org.projectlombok:lombok:1.18.30'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'

    testImplementation("org.junit.jupiter:junit-jupiter-api:${junitVersion}")
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:${junitVersion}")
}

test {
    useJUnitPlatform()
}